name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libs
        run: pnpm run typecheck:libs

      - name: Health scan
        run: node artifacts/instacollab/scripts/check-health.mjs

      - name: Typecheck api-server
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Typecheck instacollab
        run: pnpm --filter @workspace/instacollab run typecheck
