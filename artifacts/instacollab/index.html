<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InstaCollab" />
    <meta name="theme-color" content="#020617" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('app_settings');
          var theme = 'dark';
          if (raw && raw !== 'undefined') {
            var s = JSON.parse(raw);
            if (s && (s.theme === 'light' || s.theme === 'dark')) theme = s.theme;
          }
          var root = document.documentElement;
          if (theme === 'dark') root.classList.add('dark');
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/opengraph.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
    <title>InstaCollab</title>
    <meta name="description" content="InstaCollab — social platform for creators" />
    <meta property="og:title" content="InstaCollab" />
    <meta property="og:description" content="InstaCollab — social platform for creators" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="InstaCollab" />
    <meta name="twitter:description" content="InstaCollab — social platform for creators" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
