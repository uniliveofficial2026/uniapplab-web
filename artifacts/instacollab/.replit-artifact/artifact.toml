kind = "web"
previewPath = "/"
title = "InstaCollab"
version = "1.0.0"
id = "artifacts/instacollab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25173

[services.development]
run = "pnpm --filter @workspace/instacollab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/instacollab", "run", "build" ]
publicDir = "artifacts/instacollab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25173"
BASE_PATH = "/"
